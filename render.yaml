services:
  # Node.js Express Server
  - type: web
    name: volunconnect-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
        
  # Python ML Service
  - type: web
    name: volunconnect-ai-service
    env: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
