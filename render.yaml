services:
  # Node.js Express Server
  - type: web
    name: volunconnect-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
        
  # Python ML Service
  - type: web
    name: volunconnect-ai-service
    env: python
    plan: free
    rootDir: ai_service
    buildCommand: pip install --upgrade pip && pip install setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8

  # React Frontend (Vite)
  - type: web
    name: volunconnect-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: volunconnect-server
          envVarKey: RENDER_EXTERNAL_URL
